name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: "Optional: URL to Ultraleap SDK zip (if not installed on runner)"
        required: false
        type: string

jobs:
  build-windows:
    runs-on: [self-hosted, windows-leap]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller cffi

      - name: Verify Ultraleap bindings
        run: |
          python -m pip install --no-cache-dir --no-build-isolation "git+https://github.com/ultraleap/leapc-python-bindings.git#subdirectory=leapc-python-api"
          python -c "import importlib.util; spec=importlib.util.find_spec('leap'); print('leap spec:', spec)"
          python -c "import importlib.util; spec=importlib.util.find_spec('leap'); print('leap locations:', list(spec.submodule_search_locations) if spec else 'NONE')"

      - name: Configure Ultraleap SDK (optional)
        if: ${{ inputs.sdk_url != '' }}
        shell: powershell
        run: |
          $input = "${{ inputs.sdk_url }}"
          if ($input -match '^https?://') {
            $sdkZip = "$env:RUNNER_TEMP\leap_sdk.zip"
            Invoke-WebRequest -Uri $input -OutFile $sdkZip
            $dest = "C:\LeapSDK"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Expand-Archive -Path $sdkZip -DestinationPath $dest -Force
            $sdkRoot = Get-ChildItem -Path $dest -Recurse -Directory `
              | Where-Object { Test-Path (Join-Path $_.FullName "leapc_cffi") } `
              | Select-Object -First 1 -ExpandProperty FullName
            if (-not $sdkRoot) { throw "Leap SDK root not found after extract." }
            "LEAP_SDK_PATH=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            if (-not (Test-Path $input)) { throw "SDK path not found: $input" }
            "LEAP_SDK_PATH=$input" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Build exe
        shell: powershell
        run: |
          pyinstaller finger_invaders.spec --noconfirm

      - name: Verify bundled leap package
        shell: powershell
        run: |
          $leapPath = "dist\FingerInvaders\_internal\leap"
          $cffiPath = "dist\FingerInvaders\_internal\leapc_cffi"
          if (Test-Path $leapPath) {
            Write-Host "Found leap package:"; Get-ChildItem -Recurse $leapPath | Select-Object -First 20
          } else {
            Write-Host "leap package not found at $leapPath"
          }
          if (Test-Path $cffiPath) {
            Write-Host "Found leapc_cffi:"; Get-ChildItem -Recurse $cffiPath | Select-Object -First 20
          } else {
            Write-Host "leapc_cffi not found at $cffiPath"
          }

      - name: Zip artifact
        shell: powershell
        run: |
          $src = "dist\FingerInvaders"
          $zip = "FingerInvaders-windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path $src\* -DestinationPath $zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FingerInvaders-windows
          path: FingerInvaders-windows.zip
